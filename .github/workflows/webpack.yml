name: Manual Deploy

# 目标：只能手动触发 (去掉了输入框，直接读取加密 Secrets)
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 环境准备：Node v24.11.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: 'npm'

      # 环境准备：JDK 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 1. & 2. 在根目录创建 tmp 目录，并打包前端
      - name: Build Frontend
        run: |
          mkdir -p tmp
          npm install
          npm run build

      # 3. 将打包好的 browser 文件夹压缩到 tmp/browser.zip
      - name: Zip Frontend
        run: |
          cd dist/learn-dict/browser
          zip -r ../../../tmp/browser.zip .
          cd ../../../

      # 4. 后端打包，并复制 jar 包到 tmp 目录
      - name: Build Backend
        working-directory: ./back-end/sugar-dict
        run: |
          mvn clean package -DskipTests
          cp target/sugar-dict-1.0-SNAPSHOT.jar ../../tmp/

      # 5. 使用 SCP 复制 tmp 目录下的两个文件到远程服务器的 /tmp 目录
      - name: Copy files to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "tmp/browser.zip,tmp/sugar-dict-1.0-SNAPSHOT.jar"
          target: "/tmp"
          strip_components: 1  # 自动去除源路径中的 'tmp/' 前缀

      # 6. SSH 连接服务器并执行 sudo 命令
      - name: Execute SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          # 将密码传入环境变量，供脚本内部的 sudo 命令使用（比直接内嵌字符串更安全）
          PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: PASSWORD
          script: |
            echo "==== 部署文件已成功上传到服务器 /tmp 目录 ===="
            
            # 使用 echo $PASSWORD | sudo -S 实现自动输入密码
            echo $PASSWORD | sudo -S ls -la /tmp/browser.zip
            echo $PASSWORD | sudo -S ls -la /tmp/sugar-dict-1.0-SNAPSHOT.jar
            
            # TODO: 在下方继续添加你的后续部署命令
            # 例如解压前端资源：
            # echo $PASSWORD | sudo -S unzip -o /tmp/browser.zip -d /var/www/html/learn-dict
            # 例如重启后端服务：
            # echo $PASSWORD | sudo -S systemctl restart sugar-dict
